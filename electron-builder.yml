appId: com.dota2trainer.app
productName: Dota2训练工具
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.games

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
